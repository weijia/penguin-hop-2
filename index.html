<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南极大冒险 - Antarctic Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 512px;
            height: 480px;
            background: #000;
            border: 4px solid #333;
        }

        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            pointer-events: auto;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 32px;
            color: #00ffff;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 16px;
            color: #fff;
            margin: 10px 0;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #00ffff;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover {
            background: #00cccc;
        }

        .controls {
            margin-top: 30px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
        }

        .controls p {
            margin: 5px 0;
        }

        #hud {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 0 #000;
        }

        .hud-item {
            display: flex;
            gap: 20px;
        }

        .speed-bar {
            display: inline-block;
            width: 60px;
            height: 8px;
            background: #333;
            border: 1px solid #fff;
            vertical-align: middle;
            margin-left: 5px;
        }

        .speed-fill {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="256" height="240"></canvas>
        
        <div id="ui">
            <div id="hud" style="display: none;">
                <div class="hud-item">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>HI: <span id="hiScore">0</span></span>
                </div>
                <div class="hud-item">
                    <span>TIME: <span id="time">0</span></span>
                    <span>REST: <span id="rest">0</span>km</span>
                </div>
                <div class="hud-item">
                    <span>STAGE: <span id="stage">1</span></span>
                    <span>SPEED: <span class="speed-bar"><span class="speed-fill" id="speedFill"></span></span></span>
                </div>
            </div>

            <div id="startScreen">
                <h1>🐧 南极大冒险</h1>
                <p class="score-display">ANTARCTIC ADVENTURE</p>
                <button onclick="startGame()">开始游戏</button>
                <div class="controls">
                    <p>⬅️ ➡️ 左右移动</p>
                    <p>⬆️ 加速 | ⬇️ 减速</p>
                    <p>躲避冰窟，收集旗帜！</p>
                </div>
            </div>

            <div id="gameOverScreen">
                <h1>游戏结束</h1>
                <p class="score-display">最终得分: <span id="finalScore">0</span></p>
                <p class="score-display">最高得分: <span id="finalHiScore">0</span></p>
                <button onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let hiScore = localStorage.getItem('antarcticHiScore') || 0;
        let stage = 1;
        let time = 0;
        let distance = 0;
        let targetDistance = 1000;
        
        // 游戏对象
        let penguin = {
            x: 128,
            y: 180,
            width: 16,
            height: 16,
            speed: 0,
            maxSpeed: 8,
            minSpeed: 2,
            lane: 1, // 0, 1, 2 三条跑道
            targetX: 128,
            jumping: false,
            jumpHeight: 0,
            frame: 0
        };

        let obstacles = [];
        let flags = [];
        let fish = [];
        let particles = [];
        let scrollY = 0;
        let gameSpeed = 2;

        // 跑道配置
        const LANES = [64, 128, 192];
        const LANE_WIDTH = 48;

        // 输入状态
        const keys = {};

        // 监听键盘
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (gameState === 'playing') {
                if (e.key === 'ArrowLeft' && penguin.lane > 0) {
                    penguin.lane--;
                    penguin.targetX = LANES[penguin.lane];
                }
                if (e.key === 'ArrowRight' && penguin.lane < 2) {
                    penguin.lane++;
                    penguin.targetX = LANES[penguin.lane];
                }
                if (e.key === 'ArrowUp') {
                    gameSpeed = Math.min(gameSpeed + 0.5, penguin.maxSpeed);
                }
                if (e.key === 'ArrowDown') {
                    gameSpeed = Math.max(gameSpeed - 0.5, penguin.minSpeed);
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function startGame() {
            gameState = 'playing';
            score = 0;
            stage = 1;
            time = 0;
            distance = 0;
            targetDistance = 1000;
            gameSpeed = 3;
            
            penguin = {
                x: 128,
                y: 180,
                width: 16,
                height: 16,
                speed: 0,
                maxSpeed: 8,
                minSpeed: 2,
                lane: 1,
                targetX: 128,
                jumping: false,
                jumpHeight: 0,
                frame: 0
            };

            obstacles = [];
            flags = [];
            fish = [];
            particles = [];
            scrollY = 0;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            
            updateHUD();
            gameLoop();
        }

        function restartGame() {
            startGame();
        }

        function gameOver() {
            gameState = 'gameover';
            if (score > hiScore) {
                hiScore = score;
                localStorage.setItem('antarcticHiScore', hiScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHiScore').textContent = hiScore;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('hiScore').textContent = hiScore;
            document.getElementById('time').textContent = Math.floor(time);
            document.getElementById('rest').textContent = Math.max(0, Math.floor((targetDistance - distance) / 10));
            document.getElementById('stage').textContent = stage;
            document.getElementById('speedFill').style.width = ((gameSpeed - penguin.minSpeed) / (penguin.maxSpeed - penguin.minSpeed) * 100) + '%';
        }

        // 生成障碍物
        function spawnObstacle() {
            if (Math.random() < 0.02 + stage * 0.005) {
                const lane = Math.floor(Math.random() * 3);
                const type = Math.random() < 0.7 ? 'hole' : 'seal';
                obstacles.push({
                    x: LANES[lane],
                    y: -20,
                    width: type === 'hole' ? 32 : 20,
                    height: type === 'hole' ? 16 : 16,
                    type: type,
                    lane: lane
                });
            }
        }

        // 生成旗帜
        function spawnFlag() {
            if (Math.random() < 0.01) {
                const lane = Math.floor(Math.random() * 3);
                flags.push({
                    x: LANES[lane],
                    y: -20,
                    width: 12,
                    height: 16,
                    lane: lane,
                    collected: false
                });
            }
        }

        // 生成鱼
        function spawnFish() {
            if (Math.random() < 0.008) {
                const lane = Math.floor(Math.random() * 3);
                fish.push({
                    x: LANES[lane],
                    y: -20,
                    width: 12,
                    height: 8,
                    lane: lane,
                    collected: false
                });
            }
        }

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 绘制像素艺术企鹅
        function drawPenguin(x, y, frame) {
            const pixelSize = 2;
            const anim = Math.floor(frame / 8) % 2;
            
            ctx.fillStyle = '#000';
            // 身体
            ctx.fillRect(x - 6, y - 8, 12, 14);
            
            // 白色肚子
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 4, y - 4, 8, 8);
            
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 4, y - 6, 3, 3);
            ctx.fillRect(x + 1, y - 6, 3, 3);
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 3, y - 5, 1, 1);
            ctx.fillRect(x + 2, y - 5, 1, 1);
            
            // 嘴巴
            ctx.fillStyle = '#ff8800';
            ctx.fillRect(x - 2, y - 3, 4, 2);
            
            // 脚
            ctx.fillStyle = '#ff8800';
            if (anim === 0) {
                ctx.fillRect(x - 5, y + 4, 4, 3);
                ctx.fillRect(x + 1, y + 4, 4, 3);
            } else {
                ctx.fillRect(x - 6, y + 4, 4, 3);
                ctx.fillRect(x + 2, y + 4, 4, 3);
            }
            
            // 翅膀
            ctx.fillStyle = '#000';
            if (anim === 0) {
                ctx.fillRect(x - 8, y - 2, 2, 6);
                ctx.fillRect(x + 6, y - 2, 2, 6);
            } else {
                ctx.fillRect(x - 8, y - 4, 2, 6);
                ctx.fillRect(x + 6, y, 2, 6);
            }
        }

        // 绘制冰窟
        function drawHole(x, y) {
            ctx.fillStyle = '#0066cc';
            ctx.fillRect(x - 16, y, 32, 12);
            ctx.fillStyle = '#003366';
            ctx.fillRect(x - 14, y + 2, 28, 8);
            // 冰边缘
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 16, y, 32, 2);
            ctx.fillRect(x - 16, y + 10, 32, 2);
        }

        // 绘制海豹
        function drawSeal(x, y, frame) {
            const anim = Math.floor(frame / 10) % 2;
            ctx.fillStyle = '#888';
            // 身体
            ctx.fillRect(x - 10, y, 20, 12);
            // 头
            ctx.fillRect(x - 6, y - 4, 12, 8);
            // 眼睛
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 2, y - 2, 2, 2);
            ctx.fillRect(x + 2, y - 2, 2, 2);
            // 鳍
            ctx.fillStyle = '#666';
            if (anim === 0) {
                ctx.fillRect(x - 12, y + 4, 4, 6);
                ctx.fillRect(x + 8, y + 4, 4, 6);
            } else {
                ctx.fillRect(x - 12, y + 2, 4, 6);
                ctx.fillRect(x + 8, y + 6, 4, 6);
            }
        }

        // 绘制旗帜
        function drawFlag(x, y, frame) {
            const wave = Math.sin(frame * 0.2) * 2;
            // 旗杆
            ctx.fillStyle = '#888';
            ctx.fillRect(x - 1, y - 12, 2, 20);
            // 旗帜
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.moveTo(x + 1, y - 12);
            ctx.lineTo(x + 12, y - 10 + wave);
            ctx.lineTo(x + 1, y - 6);
            ctx.fill();
        }

        // 绘制鱼
        function drawFish(x, y, frame) {
            const anim = Math.floor(frame / 6) % 2;
            ctx.fillStyle = '#ff6600';
            // 鱼身
            ctx.fillRect(x - 6, y - 2, 12, 6);
            // 鱼尾
            if (anim === 0) {
                ctx.fillRect(x + 4, y - 4, 4, 2);
                ctx.fillRect(x + 4, y + 4, 4, 2);
            } else {
                ctx.fillRect(x + 4, y - 1, 4, 2);
            }
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 4, y, 2, 2);
        }

        // 绘制场景
        function drawScene() {
            // 天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, 120);
            gradient.addColorStop(0, '#00cccc');
            gradient.addColorStop(1, '#ccffff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 120);

            // 云朵
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 3; i++) {
                const cloudX = (i * 100 + scrollY * 0.1) % 300 - 20;
                const cloudY = 20 + i * 15;
                ctx.fillRect(cloudX, cloudY, 30, 10);
                ctx.fillRect(cloudX + 5, cloudY - 5, 20, 8);
            }

            // 远山
            ctx.fillStyle = '#6699cc';
            ctx.beginPath();
            ctx.moveTo(0, 100);
            for (let x = 0; x <= 256; x += 20) {
                ctx.lineTo(x, 100 - Math.sin(x * 0.05) * 15);
            }
            ctx.lineTo(256, 120);
            ctx.lineTo(0, 120);
            ctx.fill();

            // 雪地
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 100, 256, 140);

            // 跑道线
            ctx.strokeStyle = '#ccc';
            ctx.setLineDash([8, 8]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(40, 100);
            ctx.lineTo(20, 240);
            ctx.moveTo(128, 100);
            ctx.lineTo(128, 240);
            ctx.moveTo(216, 100);
            ctx.lineTo(236, 240);
            ctx.stroke();
            ctx.setLineDash([]);

            // 蓝色水域边缘
            ctx.fillStyle = '#0066cc';
            ctx.fillRect(0, 100, 30, 140);
        }

        // 游戏主循环
        function gameLoop() {
            if (gameState !== 'playing') return;

            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 256, 240);

            // 更新游戏状态
            time += 1/60;
            distance += gameSpeed;
            scrollY += gameSpeed;
            penguin.frame++;

            // 平滑移动企鹅到目标跑道
            const dx = penguin.targetX - penguin.x;
            penguin.x += dx * 0.15;

            // 生成游戏对象
            spawnObstacle();
            spawnFlag();
            spawnFish();

            // 更新和绘制场景
            drawScene();

            // 更新和绘制旗帜
            for (let i = flags.length - 1; i >= 0; i--) {
                const flag = flags[i];
                flag.y += gameSpeed;
                
                if (!flag.collected && checkCollision(
                    {x: penguin.x - 8, y: penguin.y - 8, width: 16, height: 16},
                    {x: flag.x - 6, y: flag.y - 12, width: 12, height: 20}
                )) {
                    flag.collected = true;
                    score += 100;
                    // 添加粒子效果
                    for (let j = 0; j < 5; j++) {
                        particles.push({
                            x: flag.x,
                            y: flag.y,
                            vx: (Math.random() - 0.5) * 4,
                            vy: (Math.random() - 0.5) * 4,
                            life: 20,
                            color: '#ff0000'
                        });
                    }
                }

                if (flag.y > 260) {
                    flags.splice(i, 1);
                } else if (!flag.collected) {
                    drawFlag(flag.x, flag.y, penguin.frame);
                }
            }

            // 更新和绘制鱼
            for (let i = fish.length - 1; i >= 0; i--) {
                const f = fish[i];
                f.y += gameSpeed;
                
                if (!f.collected && checkCollision(
                    {x: penguin.x - 8, y: penguin.y - 8, width: 16, height: 16},
                    {x: f.x - 6, y: f.y - 2, width: 12, height: 8}
                )) {
                    f.collected = true;
                    score += 50;
                }

                if (f.y > 260) {
                    fish.splice(i, 1);
                } else if (!f.collected) {
                    drawFish(f.x, f.y, penguin.frame);
                }
            }

            // 更新和绘制障碍物
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += gameSpeed;

                // 碰撞检测
                if (checkCollision(
                    {x: penguin.x - 6, y: penguin.y - 8, width: 12, height: 16},
                    {x: obs.x - obs.width/2, y: obs.y, width: obs.width, height: obs.height}
                )) {
                    gameOver();
                    return;
                }

                if (obs.y > 260) {
                    obstacles.splice(i, 1);
                    score += 10;
                } else {
                    if (obs.type === 'hole') {
                        drawHole(obs.x, obs.y);
                    } else {
                        drawSeal(obs.x, obs.y, penguin.frame);
                    }
                }
            }

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
                }
            }

            // 绘制企鹅
            drawPenguin(penguin.x, penguin.y, penguin.frame);

            // 检查过关
            if (distance >= targetDistance) {
                stage++;
                distance = 0;
                targetDistance += 200;
                gameSpeed = Math.min(gameSpeed + 0.5, penguin.maxSpeed);
                // 清屏效果
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, 256, 240);
            }

            // 更新HUD
            updateHUD();

            requestAnimationFrame(gameLoop);
        }

        // 初始化
        document.getElementById('hiScore').textContent = hiScore;
    </script>
</body>
</html>
