<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>南极大冒险 - Antarctic Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
            max-height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            pointer-events: auto;
            padding: 20px;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: clamp(24px, 8vw, 48px);
            color: #00ffff;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 20px;
            text-align: center;
        }

        .score-display {
            font-size: clamp(14px, 4vw, 20px);
            color: #fff;
            margin: 10px 0;
            text-align: center;
        }

        button {
            padding: clamp(12px, 4vw, 20px) clamp(24px, 8vw, 40px);
            font-size: clamp(16px, 5vw, 24px);
            background: #00ffff;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 8px;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover, button:active {
            background: #00cccc;
            transform: scale(1.05);
        }

        .controls {
            margin-top: 30px;
            font-size: clamp(12px, 3.5vw, 16px);
            color: #aaa;
            text-align: center;
            line-height: 1.8;
        }

        .controls p {
            margin: 5px 0;
        }

        #hud {
            position: absolute;
            top: 2%;
            left: 2%;
            right: 2%;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            color: #fff;
            font-size: clamp(10px, 3vw, 14px);
            text-shadow: 1px 1px 0 #000;
            gap: 5px;
        }

        .hud-item {
            display: flex;
            gap: clamp(10px, 3vw, 20px);
            flex-wrap: wrap;
        }

        .speed-bar {
            display: inline-block;
            width: clamp(40px, 15vw, 60px);
            height: clamp(6px, 2vw, 8px);
            background: #333;
            border: 1px solid #fff;
            vertical-align: middle;
            margin-left: 5px;
        }

        .speed-fill {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: width 0.1s;
        }

        /* 触摸控制按钮 */
        #touchControls {
            position: absolute;
            bottom: 5%;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 5%;
            pointer-events: auto;
        }

        .touch-btn {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(20px, 6vw, 32px);
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        .touch-group {
            display: flex;
            gap: 10px;
        }

        @media (hover: none) and (pointer: coarse) {
            #touchControls {
                display: flex;
            }
        }

        /* 横屏提示 */
        #rotateHint {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            font-size: 20px;
            text-align: center;
            padding: 20px;
        }

        @media screen and (max-width: 500px) and (orientation: portrait) {
            #rotateHint {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="rotateHint">
        <p>📱 请旋转手机至横屏</p>
        <p>以获得最佳游戏体验</p>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="hud" style="display: none;">
                <div class="hud-item">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>HI: <span id="hiScore">0</span></span>
                </div>
                <div class="hud-item">
                    <span>TIME: <span id="time">0</span></span>
                    <span>REST: <span id="rest">0</span>km</span>
                </div>
                <div class="hud-item">
                    <span>STAGE: <span id="stage">1</span></span>
                    <span>SPEED: <span class="speed-bar"><span class="speed-fill" id="speedFill"></span></span></span>
                </div>
            </div>

            <div id="startScreen">
                <h1>🐧 南极大冒险</h1>
                <p class="score-display">ANTARCTIC ADVENTURE</p>
                <button onclick="startGame()">开始游戏</button>
                <div class="controls">
                    <p>⬅️ ➡️ 左右移动 | ⬆️ 加速 | ⬇️ 减速</p>
                    <p>点击屏幕或使用键盘控制</p>
                    <p>躲避冰窟，收集旗帜！</p>
                </div>
            </div>

            <div id="gameOverScreen">
                <h1>游戏结束</h1>
                <p class="score-display">最终得分: <span id="finalScore">0</span></p>
                <p class="score-display">最高得分: <span id="finalHiScore">0</span></p>
                <button onclick="restartGame()">再玩一次</button>
            </div>
        </div>

        <div id="touchControls">
            <div class="touch-group">
                <div class="touch-btn" id="btnLeft">⬅️</div>
                <div class="touch-btn" id="btnRight">➡️</div>
            </div>
            <div class="touch-group">
                <div class="touch-btn" id="btnUp">⬆️</div>
                <div class="touch-btn" id="btnDown">⬇️</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');
        
        // 游戏常量
        const GAME_WIDTH = 256;
        const GAME_HEIGHT = 240;
        const ASPECT_RATIO = GAME_WIDTH / GAME_HEIGHT;
        
        // 缩放比例
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        // 游戏状态
        let gameState = 'start';
        let score = 0;
        let hiScore = localStorage.getItem('antarcticHiScore') || 0;
        let stage = 1;
        let time = 0;
        let distance = 0;
        let targetDistance = 1000;
        
        // 游戏对象
        let penguin = {
            x: 128,
            y: 180,
            width: 16,
            height: 16,
            speed: 0,
            maxSpeed: 8,
            minSpeed: 1,
            lane: 1,
            targetX: 128,
            jumping: false,
            jumpHeight: 0,
            frame: 0
        };

        let obstacles = [];
        let flags = [];
        let fish = [];
        let particles = [];
        let scrollY = 0;
        let gameSpeed = 2;

        // 跑道配置
        const LANES = [64, 128, 192];

        // 输入状态
        const keys = {};
        const touchState = { left: false, right: false, up: false, down: false };

        // 自适应画布大小
        function resizeCanvas() {
            const containerWidth = gameContainer.clientWidth;
            const containerHeight = gameContainer.clientHeight;
            const containerRatio = containerWidth / containerHeight;
            
            let canvasWidth, canvasHeight;
            
            if (containerRatio > ASPECT_RATIO) {
                // 容器更宽，以高度为基准
                canvasHeight = containerHeight;
                canvasWidth = canvasHeight * ASPECT_RATIO;
            } else {
                // 容器更高，以宽度为基准
                canvasWidth = containerWidth;
                canvasHeight = canvasWidth / ASPECT_RATIO;
            }
            
            // 设置画布显示大小
            canvas.style.width = canvasWidth + 'px';
            canvas.style.height = canvasHeight + 'px';
            
            // 设置画布实际分辨率（保持像素清晰）
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            
            // 计算缩放比例（用于触摸坐标转换）
            scale = canvasWidth / GAME_WIDTH;
            
            // 计算偏移量
            offsetX = (containerWidth - canvasWidth) / 2;
            offsetY = (containerHeight - canvasHeight) / 2;
        }

        // 监听窗口大小变化
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100);
        });

        // 初始化画布大小
        resizeCanvas();

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            handleInput(e.key, true);
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            handleInput(e.key, false);
        });

        function handleInput(key, pressed) {
            if (gameState !== 'playing') return;
            
            if (pressed) {
                if (key === 'ArrowLeft' && penguin.lane > 0) {
                    penguin.lane--;
                    penguin.targetX = LANES[penguin.lane];
                }
                if (key === 'ArrowRight' && penguin.lane < 2) {
                    penguin.lane++;
                    penguin.targetX = LANES[penguin.lane];
                }
                if (key === 'ArrowUp') {
                    gameSpeed = Math.min(gameSpeed + 0.5, penguin.maxSpeed);
                }
                if (key === 'ArrowDown') {
                    gameSpeed = Math.max(gameSpeed - 0.5, penguin.minSpeed);
                }
            }
        }

        // 触摸控制
        function setupTouchControls() {
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnUp = document.getElementById('btnUp');
            const btnDown = document.getElementById('btnDown');

            function addTouchListener(element, key) {
                element.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    touchState[key] = true;
                    handleInput(key === 'left' ? 'ArrowLeft' : key === 'right' ? 'ArrowRight' : key === 'up' ? 'ArrowUp' : 'ArrowDown', true);
                });
                element.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    touchState[key] = false;
                });
                element.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    handleInput(key === 'left' ? 'ArrowLeft' : key === 'right' ? 'ArrowRight' : key === 'up' ? 'ArrowUp' : 'ArrowDown', true);
                });
            }

            addTouchListener(btnLeft, 'left');
            addTouchListener(btnRight, 'right');
            addTouchListener(btnUp, 'up');
            addTouchListener(btnDown, 'down');
        }

        setupTouchControls();

        // 点击/触摸画布控制（替代方案）
        canvas.addEventListener('click', (e) => {
            if (gameState !== 'playing') return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / scale;
            const y = (e.clientY - rect.top) / scale;
            
            // 根据点击位置判断左右
            if (x < GAME_WIDTH / 3 && penguin.lane > 0) {
                penguin.lane--;
                penguin.targetX = LANES[penguin.lane];
            } else if (x > GAME_WIDTH * 2 / 3 && penguin.lane < 2) {
                penguin.lane++;
                penguin.targetX = LANES[penguin.lane];
            }
        });

        function startGame() {
            gameState = 'playing';
            score = 0;
            stage = 1;
            time = 0;
            distance = 0;
            targetDistance = 1000;
            gameSpeed = 1.5;
            
            penguin = {
                x: 128,
                y: 180,
                width: 16,
                height: 16,
                speed: 0,
                maxSpeed: 8,
                minSpeed: 1,
                lane: 1,
                targetX: 128,
                jumping: false,
                jumpHeight: 0,
                frame: 0
            };

            obstacles = [];
            flags = [];
            fish = [];
            particles = [];
            scrollY = 0;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            
            updateHUD();
            gameLoop();
        }

        function restartGame() {
            startGame();
        }

        function gameOver() {
            gameState = 'gameover';
            if (score > hiScore) {
                hiScore = score;
                localStorage.setItem('antarcticHiScore', hiScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHiScore').textContent = hiScore;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('hiScore').textContent = hiScore;
            document.getElementById('time').textContent = Math.floor(time);
            document.getElementById('rest').textContent = Math.max(0, Math.floor((targetDistance - distance) / 10));
            document.getElementById('stage').textContent = stage;
            document.getElementById('speedFill').style.width = ((gameSpeed - penguin.minSpeed) / (penguin.maxSpeed - penguin.minSpeed) * 100) + '%';
        }

        function spawnObstacle() {
            if (Math.random() < 0.012 + stage * 0.004) {
                const lane = Math.floor(Math.random() * 3);
                const type = Math.random() < 0.7 ? 'hole' : 'seal';
                obstacles.push({
                    x: LANES[lane],
                    y: -20,
                    width: type === 'hole' ? 32 : 20,
                    height: type === 'hole' ? 16 : 16,
                    type: type,
                    lane: lane
                });
            }
        }

        function spawnFlag() {
            if (Math.random() < 0.01) {
                const lane = Math.floor(Math.random() * 3);
                flags.push({
                    x: LANES[lane],
                    y: -20,
                    width: 12,
                    height: 16,
                    lane: lane,
                    collected: false
                });
            }
        }

        function spawnFish() {
            if (Math.random() < 0.008) {
                const lane = Math.floor(Math.random() * 3);
                fish.push({
                    x: LANES[lane],
                    y: -20,
                    width: 12,
                    height: 8,
                    lane: lane,
                    collected: false
                });
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function drawPenguin(x, y, frame) {
            const anim = Math.floor(frame / 8) % 2;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 6, y - 8, 12, 14);
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 4, y - 4, 8, 8);
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 4, y - 6, 3, 3);
            ctx.fillRect(x + 1, y - 6, 3, 3);
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 3, y - 5, 1, 1);
            ctx.fillRect(x + 2, y - 5, 1, 1);
            
            ctx.fillStyle = '#ff8800';
            ctx.fillRect(x - 2, y - 3, 4, 2);
            
            ctx.fillStyle = '#ff8800';
            if (anim === 0) {
                ctx.fillRect(x - 5, y + 4, 4, 3);
                ctx.fillRect(x + 1, y + 4, 4, 3);
            } else {
                ctx.fillRect(x - 6, y + 4, 4, 3);
                ctx.fillRect(x + 2, y + 4, 4, 3);
            }
            
            ctx.fillStyle = '#000';
            if (anim === 0) {
                ctx.fillRect(x - 8, y - 2, 2, 6);
                ctx.fillRect(x + 6, y - 2, 2, 6);
            } else {
                ctx.fillRect(x - 8, y - 4, 2, 6);
                ctx.fillRect(x + 6, y, 2, 6);
            }
        }

        function drawHole(x, y) {
            ctx.fillStyle = '#0066cc';
            ctx.fillRect(x - 16, y, 32, 12);
            ctx.fillStyle = '#003366';
            ctx.fillRect(x - 14, y + 2, 28, 8);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 16, y, 32, 2);
            ctx.fillRect(x - 16, y + 10, 32, 2);
        }

        function drawSeal(x, y, frame) {
            const anim = Math.floor(frame / 10) % 2;
            ctx.fillStyle = '#888';
            ctx.fillRect(x - 10, y, 20, 12);
            ctx.fillRect(x - 6, y - 4, 12, 8);
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 2, y - 2, 2, 2);
            ctx.fillRect(x + 2, y - 2, 2, 2);
            ctx.fillStyle = '#666';
            if (anim === 0) {
                ctx.fillRect(x - 12, y + 4, 4, 6);
                ctx.fillRect(x + 8, y + 4, 4, 6);
            } else {
                ctx.fillRect(x - 12, y + 2, 4, 6);
                ctx.fillRect(x + 8, y + 6, 4, 6);
            }
        }

        function drawFlag(x, y, frame) {
            const wave = Math.sin(frame * 0.2) * 2;
            ctx.fillStyle = '#888';
            ctx.fillRect(x - 1, y - 12, 2, 20);
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.moveTo(x + 1, y - 12);
            ctx.lineTo(x + 12, y - 10 + wave);
            ctx.lineTo(x + 1, y - 6);
            ctx.fill();
        }

        function drawFish(x, y, frame) {
            const anim = Math.floor(frame / 6) % 2;
            ctx.fillStyle = '#ff6600';
            ctx.fillRect(x - 6, y - 2, 12, 6);
            if (anim === 0) {
                ctx.fillRect(x + 4, y - 4, 4, 2);
                ctx.fillRect(x + 4, y + 4, 4, 2);
            } else {
                ctx.fillRect(x + 4, y - 1, 4, 2);
            }
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 4, y, 2, 2);
        }

        function drawScene() {
            const gradient = ctx.createLinearGradient(0, 0, 0, 120);
            gradient.addColorStop(0, '#00cccc');
            gradient.addColorStop(1, '#ccffff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 120);

            ctx.fillStyle = '#fff';
            for (let i = 0; i < 3; i++) {
                const cloudX = (i * 100 + scrollY * 0.1) % 300 - 20;
                const cloudY = 20 + i * 15;
                ctx.fillRect(cloudX, cloudY, 30, 10);
                ctx.fillRect(cloudX + 5, cloudY - 5, 20, 8);
            }

            ctx.fillStyle = '#6699cc';
            ctx.beginPath();
            ctx.moveTo(0, 100);
            for (let x = 0; x <= 256; x += 20) {
                ctx.lineTo(x, 100 - Math.sin(x * 0.05) * 15);
            }
            ctx.lineTo(256, 120);
            ctx.lineTo(0, 120);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 100, 256, 140);

            ctx.strokeStyle = '#ccc';
            ctx.setLineDash([8, 8]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(40, 100);
            ctx.lineTo(20, 240);
            ctx.moveTo(128, 100);
            ctx.lineTo(128, 240);
            ctx.moveTo(216, 100);
            ctx.lineTo(236, 240);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#0066cc';
            ctx.fillRect(0, 100, 30, 140);
        }

        function gameLoop() {
            if (gameState !== 'playing') return;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 256, 240);

            time += 1/60;
            distance += gameSpeed;
            scrollY += gameSpeed;
            penguin.frame++;

            const dx = penguin.targetX - penguin.x;
            penguin.x += dx * 0.15;

            spawnObstacle();
            spawnFlag();
            spawnFish();

            drawScene();

            for (let i = flags.length - 1; i >= 0; i--) {
                const flag = flags[i];
                flag.y += gameSpeed;
                
                if (!flag.collected && checkCollision(
                    {x: penguin.x - 8, y: penguin.y - 8, width: 16, height: 16},
                    {x: flag.x - 6, y: flag.y - 12, width: 12, height: 20}
                )) {
                    flag.collected = true;
                    score += 100;
                    for (let j = 0; j < 5; j++) {
                        particles.push({
                            x: flag.x,
                            y: flag.y,
                            vx: (Math.random() - 0.5) * 4,
                            vy: (Math.random() - 0.5) * 4,
                            life: 20,
                            color: '#ff0000'
                        });
                    }
                }

                if (flag.y > 260) {
                    flags.splice(i, 1);
                } else if (!flag.collected) {
                    drawFlag(flag.x, flag.y, penguin.frame);
                }
            }

            for (let i = fish.length - 1; i >= 0; i--) {
                const f = fish[i];
                f.y += gameSpeed;
                
                if (!f.collected && checkCollision(
                    {x: penguin.x - 8, y: penguin.y - 8, width: 16, height: 16},
                    {x: f.x - 6, y: f.y - 2, width: 12, height: 8}
                )) {
                    f.collected = true;
                    score += 50;
                }

                if (f.y > 260) {
                    fish.splice(i, 1);
                } else if (!f.collected) {
                    drawFish(f.x, f.y, penguin.frame);
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += gameSpeed;

                if (checkCollision(
                    {x: penguin.x - 6, y: penguin.y - 8, width: 12, height: 16},
                    {x: obs.x - obs.width/2, y: obs.y, width: obs.width, height: obs.height}
                )) {
                    gameOver();
                    return;
                }

                if (obs.y > 260) {
                    obstacles.splice(i, 1);
                    score += 10;
                } else {
                    if (obs.type === 'hole') {
                        drawHole(obs.x, obs.y);
                    } else {
                        drawSeal(obs.x, obs.y, penguin.frame);
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
                }
            }

            drawPenguin(penguin.x, penguin.y, penguin.frame);

            if (distance >= targetDistance) {
                stage++;
                distance = 0;
                targetDistance += 200;
                gameSpeed = Math.min(gameSpeed + 0.5, penguin.maxSpeed);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, 256, 240);
            }

            updateHUD();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('hiScore').textContent = hiScore;
    </script>
</body>
</html>
